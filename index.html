<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Hawa's Shape Puzzle</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>">
<style>
  :root{ --ink:#6b5b73; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#c3e7f5;
    font-family:ui-rounded,"Segoe UI Rounded","Comic Sans MS","Segoe UI",system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
  #app{position:fixed;inset:0;overflow:hidden}
  #scene{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  #scene text{font-family:inherit;font-weight:800}

  /* ---------- board (slots) + stage (pieces) ---------- */
  #board,#stage{position:absolute;inset:0;pointer-events:none;z-index:5}
  #stage{z-index:10}
  .slot{position:absolute;left:0;top:0;pointer-events:auto;will-change:transform;
    filter:drop-shadow(0 4px 0 rgba(90,70,110,.10))}
  .slot svg,.piece svg{width:100%;height:100%;display:block;pointer-events:none}
  .slot.wobble{animation:wob .45s ease}
  .slot.hintglow svg .outline{stroke-opacity:1;animation:slotGlow 1.1s ease-in-out infinite}
  .slot.filled svg .outline{opacity:0}
  @keyframes slotGlow{50%{stroke-width:11;filter:drop-shadow(0 0 12px rgba(246,196,83,.9))}}
  @keyframes wob{0%,100%{transform:translate(var(--x),var(--y)) rotate(0)}25%{transform:translate(var(--x),var(--y)) rotate(-6deg)}75%{transform:translate(var(--x),var(--y)) rotate(6deg)}}

  .piece{position:absolute;left:0;top:0;pointer-events:auto;cursor:pointer;will-change:transform;
    filter:drop-shadow(0 5px 0 rgba(90,70,110,.16))}
  .piece.lift{z-index:40}
  .piece.sel{z-index:40}
  .piece.placed{pointer-events:none}
  .piece.enter{animation:popIn .5s cubic-bezier(.34,1.56,.64,1) backwards}
  @keyframes popIn{from{opacity:0;transform:translate(var(--x),var(--y)) scale(0)}}

  /* ---------- mascot ---------- */
  .animal{display:none}
  .animal.on{display:inline}
  .rig{animation:breathe 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 85%}
  @keyframes breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.012,1.028)}}
  .is-happy .rig{animation:happyBounce .55s cubic-bezier(.34,1.56,.64,1) 2}
  .is-cheer .rig{animation:happyBounce .5s cubic-bezier(.34,1.56,.64,1) 4}
  @keyframes happyBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-24px) scale(1.03)}}
  .eye-happy{display:none}
  .is-happy .eye-happy,.is-cheer .eye-happy{display:inline}
  .is-happy .eye-open,.is-cheer .eye-open{display:none}
  .lid{transform-box:fill-box;transform-origin:center top;transform:scaleY(0);animation:blink 4.6s linear infinite}
  @keyframes blink{0%,93%,100%{transform:scaleY(0)}95.5%,97%{transform:scaleY(1)}}
  .tail{transform-box:fill-box;transform-origin:10% 90%}
  .is-happy .tail,.is-cheer .tail{animation:wag .28s ease-in-out 5}
  @keyframes wag{50%{transform:rotate(18deg)}}

  /* ---------- scenery ---------- */
  .cloud{will-change:transform}
  .c1{animation:drift 30s ease-in-out infinite alternate}
  .c2{animation:drift 40s ease-in-out infinite alternate-reverse}
  @keyframes drift{to{transform:translateX(46px)}}

  #fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:22}

  /* ---------- celebration burst ---------- */
  #burst{position:absolute;inset:0;z-index:24;display:flex;align-items:center;justify-content:center;
    pointer-events:none;opacity:0}
  #burst.show{animation:burstIn 2.6s ease forwards}
  @keyframes burstIn{0%{opacity:0;transform:scale(.4)}12%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
  .star-frame{position:relative;width:clamp(120px,34vh,240px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .star-frame .rays{position:absolute;inset:-14%;animation:spin 6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .kid{width:70%;height:70%;border-radius:50%;object-fit:cover;border:7px solid #fff;
    box-shadow:0 8px 22px rgba(120,90,60,.3);background:#ffe8c9}
  .kid-fallback{display:none}

  /* ---------- hud ---------- */
  .hud{position:absolute;top:calc(10px + env(safe-area-inset-top));z-index:30;height:52px;border-radius:26px;
    border:3px solid #e3d2ee;background:rgba(255,255,255,.9);display:flex;align-items:center;
    justify-content:center;cursor:pointer;padding:0}
  #muteBtn{right:14px;width:52px}
  #langBtn{right:78px;min-width:58px;padding:0 14px;color:#7a8b7a;border-color:#cfe0d0;font-weight:800;font-size:17px}
  #muteBtn svg{width:26px;height:26px;fill:#8b7a99;pointer-events:none}
  /* player badge */
  #playerBadge{position:absolute;top:calc(10px + env(safe-area-inset-top));left:14px;z-index:30;
    width:56px;height:56px;border-radius:50%;overflow:hidden;border:3px solid #fff;
    box-shadow:0 4px 10px rgba(120,90,60,.22);background:#ffe8c9}
  #playerBadge img{width:100%;height:100%;object-fit:cover;display:block}
  #playerBadge .pb-fallback{display:none;width:100%;height:100%}

  /* ---------- title ---------- */
  #title{position:absolute;inset:0;z-index:45;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2.2vh;
    background:rgba(255,252,244,.66);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    transition:opacity .5s;cursor:pointer}
  #title.hidden{opacity:0;pointer-events:none}
  #title h1{margin:0;font-size:clamp(30px,8vh,58px);color:#5f6fae;text-shadow:0 3px 0 #fff}
  #title .sub{margin:0;font-size:clamp(15px,3.4vh,24px);color:#9a8fb8;font-weight:700}
  #titleKid{width:clamp(78px,15vh,120px);aspect-ratio:1;border-radius:50%;object-fit:cover;
    border:5px solid #fff;box-shadow:0 6px 16px rgba(120,90,60,.25);background:#ffe8c9}
  #titleKidFallback{display:none}
  #playBtn{width:clamp(88px,18vh,140px);aspect-ratio:1;border-radius:50%;
    background:#ff8f7a;border:6px solid #fff;box-shadow:0 8px 0 rgba(200,90,70,.35);
    display:flex;align-items:center;justify-content:center;animation:pulse 1.8s ease-in-out infinite}
  #playBtn svg{width:42%;height:42%;fill:#fff;margin-left:8%}
  @keyframes pulse{50%{transform:scale(1.07)}}

  /* ---------- rotate guard ---------- */
  #rotate{display:none;position:absolute;inset:0;z-index:60;background:#b3d9ec;
    flex-direction:column;align-items:center;justify-content:center;gap:20px;
    color:#4a5f8a;font-size:clamp(18px,3vw,26px);font-weight:800;text-align:center;padding:20px}
  #rotate .phone{width:70px;height:120px;border:8px solid #4a5f8a;border-radius:16px;
    animation:turnPhone 2.2s ease-in-out infinite}
  @keyframes turnPhone{0%,20%{transform:rotate(0)}60%,100%{transform:rotate(-90deg)}}
  @media (orientation:portrait){#rotate{display:flex}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01s !important;animation-iteration-count:1 !important;transition-duration:.01s !important}
  }
</style>
</head>

/* ---------------- ticker + tween ---------------- */
const Ticker = (() => {
  const fns = new Set(); let raf = null, last = 0;
  function frame(ts){ const dt = Math.min(50, ts - last); last = ts; fns.forEach(f => f(dt)); raf = fns.size ? requestAnimationFrame(frame) : null; }
  return { add(f){ fns.add(f); if(!raf){ last = performance.now(); raf = requestAnimationFrame(frame); } }, remove(f){ fns.delete(f); } };
})();
const easeOutCubic = p => 1 - Math.pow(1 - p, 3);
const easeOutBack  = p => 1 + 2.2 * Math.pow(p - 1, 3) + 1.2 * Math.pow(p - 1, 2);
function tween(o){
  let t = 0;
  const f = dt => { t += dt; const p = Math.min(1, t / (o.dur || 400)); o.update((o.ease || easeOutCubic)(p), p); if(p >= 1){ Ticker.remove(f); o.done && o.done(); } };
  Ticker.add(f);
}

/* ---------------- audio ---------------- */
const Sound = (() => {
  let ac = null, master = null; let on = sv.sound !== false;
  function init(){ if(ac) return; try { ac = new (window.AudioContext || window.webkitAudioContext)(); master = ac.createGain(); master.gain.value = 0.5; master.connect(ac.destination); } catch(e){} }
  function tone(freq, when, dur, type, vol, glideTo){
    if(!ac || !S.on) return;
    const t0 = ac.currentTime + when;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(vol || 0.35, t0); g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.05);
  }
  const S = {
    get on(){ return on; }, set on(v){ on = v; }, init,
    resume(){ ac && ac.resume && ac.resume(); }, suspend(){ ac && ac.suspend && ac.suspend(); },
    pop(){ tone(340, 0, 0.09, 'triangle', 0.3, 560); },
    clack(){ tone(180, 0, 0.06, 'square', 0.16); tone(90, 0, 0.09, 'sine', 0.22); },
    chime(){ [523.25, 659.25, 783.99].forEach((f, i) => tone(f, i * 0.08, 0.5, 'sine', 0.3)); tone(1046.5, 0.24, 0.6, 'sine', 0.18); },
    big(){ [523.25,659.25,783.99].forEach((f,i)=>tone(f,i*0.08,0.5,'sine',0.3)); tone(392,0.1,0.5,'sine',0.22,880); [659.25,783.99,1046.5].forEach((f,i)=>tone(f,0.42+i*0.1,0.55,'sine',0.26)); },
    uhuh(){ tone(300, 0, 0.12, 'sine', 0.2); tone(255, 0.15, 0.16, 'sine', 0.2); },
  };
  return S;
})();

/* ---------------- voice (EN / UR) ---------------- */
let voices = [];
function loadVoices(){ try { voices = window.speechSynthesis.getVoices() || []; } catch(e){ voices = []; } }
if('speechSynthesis' in window){ loadVoices(); try { speechSynthesis.onvoiceschanged = loadVoices; } catch(e){} }
function pickVoice(two){
  const pref = two === 'ur' ? ['ur-pk','ur-in','ur'] : ['en-us','en-gb','en-au','en-in','en'];
  for(const p of pref){ const v = voices.find(v => (v.lang||'').toLowerCase().replace('_','-').startsWith(p)); if(v) return v; }
  return null;
}
function speakRaw(text, code){
  if(!CONFIG.voice || !Sound.on || !('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.92; u.pitch = 1.12; u.lang = code;
    const v = pickVoice(code.slice(0,2).toLowerCase()); if(v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e){}
}
function say(kind, d){
  d = d || {};
  let L = lang;
  if(L === 'ur' && !pickVoice('ur')) L = 'en';   // no Urdu voice on device -> speak English so audio stays useful
  let text, code;
  if(L === 'ur'){
    code = 'ur-PK';
    if(kind === 'start')      text = 'چلو شکلیں لگائیں!';
    else if(kind === 'yum')   text = d.colorUr + ' ' + d.shapeUr + '!';
    else if(kind === 'big')   text = 'شاباش ' + CONFIG.childName + '!';
    else if(kind === 'again') text = 'دوبارہ کوشش کرو!';
    else if(kind === 'hello') text = 'ہیلو ' + CONFIG.childName + '! چلو کھیلیں!';
  } else {
    code = 'en-US';
    if(kind === 'start')      text = 'Let’s match the shapes!';
    else if(kind === 'yum')   text = d.colorEn + ' ' + d.shapeEn + '!';
    else if(kind === 'big')   text = 'Well done, ' + CONFIG.childName + '!';
    else if(kind === 'again') text = 'Try again!';
    else if(kind === 'hello') text = 'Hi ' + CONFIG.childName + '! Let’s play!';
  }
  if(text) speakRaw(text, code);
}

/* ---------------- confetti ---------------- */
const FX = (() => {
  const canvas = $('#fx'), ctx = canvas.getContext('2d');
  const COLORS = ['#ef6461', '#5b9bd5', '#6fbf73', '#f6c453', '#ef8fb2', '#aebde9'];
  const pool = []; let running = false;
  function resize(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize(); addEventListener('resize', resize);
  function step(dt){
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    let alive = 0; const k = dt / 16.7;
    for(const p of pool){
      if(!p.active) continue;
      p.life += dt;
      if(p.life > p.ttl || p.y > innerHeight + 30){ p.active = false; continue; }
      alive++;
      p.vy += 0.12 * k; p.x += p.vx * k; p.y += p.vy * k; p.rot += p.vr * k;
      const a = Math.max(0, 1 - p.life / p.ttl);
      ctx.save(); ctx.globalAlpha = a; ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color;
      if(p.shape === 0){ ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, 7); ctx.fill(); }
      else if(p.shape === 1){ ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); }
      else { ctx.beginPath(); ctx.moveTo(0, -p.size / 2); ctx.lineTo(p.size / 2, p.size / 2); ctx.lineTo(-p.size / 2, p.size / 2); ctx.closePath(); ctx.fill(); }
      ctx.restore();
    }
    if(!alive){ running = false; Ticker.remove(step); ctx.clearRect(0, 0, innerWidth, innerHeight); }
  }
  return {
    spawn(x, y, n, big){
      if(RM) return;
      for(let i = 0; i < n; i++){
        let p = pool.find(q => !q.active);
        if(!p){ if(pool.length >= 160) break; p = {}; pool.push(p); }
        const pw = big ? 1.4 : 1;
        p.active = true; p.x = x; p.y = y;
        p.vx = (Math.random() * 2 - 1) * 3.6 * pw; p.vy = -(2.2 + Math.random() * 3.4) * pw;
        p.rot = Math.random() * 6.28; p.vr = (Math.random() * 2 - 1) * 0.18;
        p.size = 6 + Math.random() * 6; p.color = COLORS[(Math.random() * COLORS.length) | 0];
        p.shape = (Math.random() * 3) | 0; p.life = 0; p.ttl = 1300 + Math.random() * 800;
      }
      if(!running){ running = true; Ticker.add(step); }
    }
  };
})();

function wirePhoto(imgId, fbId){
  const img = document.getElementById(imgId), fb = document.getElementById(fbId);
  if(!img) return;
  img.addEventListener('error', () => { img.style.display = 'none'; if(fb) fb.style.display = 'block'; });
  if(img.complete && img.naturalWidth === 0){ img.style.display = 'none'; if(fb) fb.style.display = 'block'; }
}

/* ---------------- game state ---------------- */
let started = false, busy = false;
let board = null;              // { slots:[], pieces:[], placed:0, count }
let mascot = null;
let drag = null, selected = null;
let slotSize = 90, pieceSize = 84;

function shuffle(a){ for(let i = a.length - 1; i > 0; i--){ const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; } return a; }

function setPiece(p, scale){
  const s = scale == null ? 1 : scale;
  p.el.style.width = pieceSize + 'px'; p.el.style.height = pieceSize + 'px';
  p.el.style.transform = 'translate(' + (p.x - pieceSize/2) + 'px,' + (p.y - pieceSize/2) + 'px) scale(' + s + ')';
}
function setSlot(sl){
  sl.el.style.width = slotSize + 'px'; sl.el.style.height = slotSize + 'px';
  sl.el.style.setProperty('--x', (sl.x - slotSize/2) + 'px');
  sl.el.style.setProperty('--y', (sl.y - slotSize/2) + 'px');
  sl.el.style.transform = 'translate(' + (sl.x - slotSize/2) + 'px,' + (sl.y - slotSize/2) + 'px)';
}

/* ---------------- layout ---------------- */
function computeLayout(){
  if(!board) return;
  const W = innerWidth, H = innerHeight, n = board.count;
  slotSize = Math.max(56, Math.min(W / (n + 0.7), H * 0.26));
  pieceSize = slotSize * 0.94;
  const gap = slotSize * 0.42;

  const rowW = n * slotSize + (n - 1) * gap;
  let sx = (W - rowW) / 2 + slotSize / 2;
  const slotY = Math.max(slotSize * 0.7 + 20, H * 0.21);
  board.slots.forEach((sl, i) => { sl.x = sx + i * (slotSize + gap); sl.y = slotY; setSlot(sl); });

  const pRowW = n * pieceSize + (n - 1) * gap;
  let px = (W - pRowW) / 2 + pieceSize / 2;
  const trayY = H - Math.max(pieceSize * 0.72 + 14, H * 0.16);
  board.pieces.forEach((p, i) => {
    p.home = { x: px + i * (pieceSize + gap), y: trayY };
    if(p.placed){ const sl = slotFor(p.id); p.x = sl.x; p.y = sl.y; }
    else if(p !== (drag && drag.p) ){ p.x = p.home.x; p.y = p.home.y; }
    setPiece(p, p.placed ? 1 : 1);
  });
}
addEventListener('resize', () => { FX && 0; computeLayout(); });

function slotFor(id){ return board.slots.find(s => s.id === id); }

/* ---------------- build board ---------------- */
function showMascot(a){ ANIMALS.forEach(x => x.el.classList.toggle('on', x === a)); mascot = a.el; mascot.classList.remove('is-happy','is-cheer'); }
function mascotReact(cls){ if(!mascot) return; mascot.classList.remove('is-happy','is-cheer'); void mascot.offsetWidth; mascot.classList.add(cls); }

function buildBoard(){
  busy = true; selected = null; drag = null;
  boardEl.innerHTML = ''; stageEl.innerHTML = '';
  const count = Math.min(SHAPES.length, state.level + 1);
  showMascot(ANIMALS[state.boards % ANIMALS.length]);

  const chosen = shuffle(SHAPES.slice()).slice(0, count);
  const slots = shuffle(chosen.slice());       // slot order
  const pieces = shuffle(chosen.slice());      // tray order (independent)

  board = { slots: [], pieces: [], placed: 0, count };

  slots.forEach(s => {
    const el = document.createElement('div');
    el.className = 'slot'; el.dataset.shape = s.id; el.innerHTML = slotSVG(s);
    boardEl.appendChild(el);
    board.slots.push({ id: s.id, el, x: 0, y: 0, filled: false });
  });
  pieces.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'piece enter'; el.dataset.shape = s.id; el.style.animationDelay = (i * 80) + 'ms';
    el.innerHTML = pieceSVG(s);
    stageEl.appendChild(el);
    const p = { id: s.id, shape: s, el, x: 0, y: 0, home: null, placed: false, misses: 0 };
    el.style.setProperty('--x', '0px');
    board.pieces.push(p);
  });

  computeLayout();
  // set enter animation origin vars
  board.pieces.forEach(p => { p.el.style.setProperty('--x', (p.x - pieceSize/2) + 'px'); });

  setTimeout(() => { busy = false; }, 480);
  say('start');
}

/* ---------------- placement ---------------- */
function nearestSlot(p){
  let best = null, bd = 1e9;
  for(const sl of board.slots){ if(sl.filled) continue; const d = Math.hypot(p.x - sl.x, p.y - sl.y); if(d < bd){ bd = d; best = sl; } }
  return { sl: best, d: bd };
}

function placeInto(p, sl){
  busy = true; p.placed = true; sl.filled = true;
  p.el.classList.add('placed'); p.el.classList.remove('lift','sel');
  sl.el.classList.remove('hintglow');
  const sx = p.x, sy = p.y;
  Sound.clack();
  tween({ dur: 300, ease: easeOutBack,
    update: t => { p.x = sx + (sl.x - sx) * t; p.y = sy + (sl.y - sy) * t; setPiece(p, 1 + 0.12 * Math.sin(Math.PI * t)); },
    done: () => {
      p.x = sl.x; p.y = sl.y; setPiece(p, 1);
      sl.el.classList.add('filled');
      Sound.chime();
      say('yum', { colorEn: p.shape.colorName, shapeEn: p.shape.name.toLowerCase(), colorUr: p.shape.colorNameUr, shapeUr: p.shape.nameUr });
      FX.spawn(sl.x, sl.y, 20, false);
      mascotReact('is-happy');
      board.placed++;
      if(board.placed >= board.count){ setTimeout(boardComplete, 550); }
      else busy = false;
    } });
}

function rejectAt(p, sl){
  p.misses++;
  Sound.uhuh();
  if(sl){ sl.el.classList.remove('wobble'); void sl.el.offsetWidth; sl.el.classList.add('wobble'); setTimeout(() => sl.el.classList.remove('wobble'), 480); }
  homePiece(p, true);
  if(p.misses >= 2){ const t = slotFor(p.id); t && !t.filled && t.el.classList.add('hintglow'); }
}

function homePiece(p, wrong){
  busy = true;
  const sx = p.x, sy = p.y;
  tween({ dur: 380, ease: easeOutBack,
    update: t => { p.x = sx + (p.home.x - sx) * t; p.y = sy + (p.home.y - sy) * t; setPiece(p, (wrong ? 1.12 : 1.14) - 0.14 * t); },
    done: () => { p.x = p.home.x; p.y = p.home.y; setPiece(p, 1); p.el.classList.remove('lift'); busy = false; } });
}

function tryDrop(p){
  const { sl, d } = nearestSlot(p);
  if(sl && d < slotSize * 0.85){
    if(sl.id === p.id) placeInto(p, sl);
    else rejectAt(p, sl);
  } else {
    homePiece(p, false);
  }
}

function boardComplete(){
  state.boards++; state.sinceUp++;
  if(state.sinceUp >= 2 && state.level < 4){ state.level++; state.sinceUp = 0; }
  persist();
  Sound.big();
  say('big');
  mascotReact('is-cheer');
  FX.spawn(innerWidth/2, innerHeight*0.5, 90, true);
  const burst = $('#burst'); burst.classList.remove('show'); void burst.offsetWidth; burst.classList.add('show');
  setTimeout(() => { burst.classList.remove('show'); buildBoard(); }, 2500);
}

/* ---------------- input ---------------- */
function pieceUnder(target){ return target.closest && target.closest('.piece'); }
function slotUnder(target){ return target.closest && target.closest('.slot'); }
function findPiece(el){ return board && board.pieces.find(p => p.el === el); }
function findSlot(el){ return board && board.slots.find(s => s.el === el); }

function onDown(e){
  if(e.target.closest('#muteBtn') || e.target.closest('#langBtn')) return;
  if(!e.isPrimary) return;
  if(!started){ startGame(); return; }
  if(busy) return;

  const pel = pieceUnder(e.target);
  if(pel){
    const p = findPiece(pel);
    if(!p || p.placed) return;
    e.preventDefault();
    if(selected && selected !== p){ selected.el.classList.remove('sel'); selected = null; }
    drag = { p, pid: e.pointerId, sx: e.clientX, sy: e.clientY, ox: p.x - e.clientX, oy: p.y - e.clientY, moved: false };
    try { pel.setPointerCapture(e.pointerId); } catch(err){}
    pel.classList.add('lift'); Sound.pop();
    return;
  }
  // tap on a slot while a piece is selected -> attempt
  const sel = slotUnder(e.target);
  if(sel && selected){
    const sl = findSlot(sel); const p = selected;
    selected = null; p.el.classList.remove('sel');
    if(sl.filled){ homePieceKeep(p); }
    else if(sl.id === p.id){ placeInto(p, sl); }
    else { rejectAt(p, sl); }
    return;
  }
  if(selected){ selected.el.classList.remove('sel'); selected = null; }
}
function homePieceKeep(p){ /* piece already at home; just deselect visually */ setPiece(p, 1); }

function onMove(e){
  if(!drag || e.pointerId !== drag.pid) return;
  const dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
  if(Math.hypot(dx, dy) > 10) drag.moved = true;
  if(drag.moved){ drag.p.x = e.clientX + drag.ox; drag.p.y = e.clientY + drag.oy; setPiece(drag.p, 1.14); }
}
function onUp(e){
  if(!drag || e.pointerId !== drag.pid) return;
  const p = drag.p, moved = drag.moved; drag = null;
  if(!moved){
    if(selected === p){ selected = null; p.el.classList.remove('sel'); homePieceKeep(p); }
    else { p.el.classList.remove('lift'); selected = p; p.el.classList.add('sel'); }
    return;
  }
  tryDrop(p);
}
function onCancel(e){ if(!drag || e.pointerId !== drag.pid) return; const p = drag.p; drag = null; homePiece(p, false); }

document.addEventListener('pointerdown', onDown, { passive: false });
document.addEventListener('pointermove', onMove, { passive: true });
document.addEventListener('pointerup', onUp, { passive: true });
document.addEventListener('pointercancel', onCancel, { passive: true });
window.addEventListener('contextmenu', e => e.preventDefault());

/* selected piece gentle wiggle via rAF (keeps transform authoritative) */
(function selWiggle(){
  let t0 = performance.now();
  function loop(ts){
    if(selected && !drag){ const a = Math.sin((ts - t0) / 220) * 0.05; selected.el.style.transform = 'translate(' + (selected.x - pieceSize/2) + 'px,' + (selected.y - pieceSize/2) + 'px) scale(1.1) rotate(' + a + 'rad)'; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

/* ---------------- lifecycle ---------------- */

  Sound.init(); Sound.resume();
  titleEl.classList.add('hidden');
  say('hello');
  buildBoard();
}
document.addEventListener('visibilitychange', () => {
  if(document.hidden){ Sound.suspend(); try { speechSynthesis.cancel(); } catch(e){} }
  else { Sound.resume(); }
});

/* boot: show a mascot behind the title */
showMascot(ANIMALS[0]);

/* debug handle */
window.__hawa = {
  get board(){ return board; }, get state(){ return state; },
  get lang(){ return lang; }, voicesCount: () => voices.length, hasUrdu: () => !!pickVoice('ur')
};

})();
