<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hawa's Bunny Baby</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none;
      font-family:'Segoe UI Rounded','Comic Sans MS','Segoe UI',system-ui,sans-serif; }
  body { background:#ffe9ee; }

  /* ============ STAGE & SCENES ============ */
  #stage { position:fixed; inset:0; overflow:hidden; transition:background 1.2s ease; }
  body.s-feed  #stage { background:linear-gradient(180deg,#fff3d6 0%,#ffe3c2 55%,#ffd1b0 100%); }
  body.s-sleep #stage { background:linear-gradient(180deg,#d9c8f5 0%,#c9b6ef 60%,#b7a3e3 100%); }
  body.s-sleep.dark #stage { background:linear-gradient(180deg,#1c1840 0%,#2a2260 60%,#3a2d72 100%); }
  body.s-sing  #stage { background:linear-gradient(180deg,#ffd9e8 0%,#ffc4dd 50%,#ffb0d0 100%); }
  body.s-tidy  #stage { background:linear-gradient(180deg,#d8f3ff 0%,#c2e9fb 55%,#b0ddf4 100%); }
  body.s-stack #stage { background:linear-gradient(180deg,#eafbe7 0%,#d7f5d0 55%,#c3edc4 100%); }
  body.s-splash #stage { background:linear-gradient(180deg,#ffe4ec 0%,#ffd3e0 60%,#ffc2d4 100%); }

  .scene { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .scene.active { opacity:1; pointer-events:auto; }

  /* ============ BUNNY (persistent) ============ */
  #bunnyWrap { position:absolute; width:52vmin; height:72.8vmin; left:50%; top:50%;
      transform:translate(-50%,-52%); transition:all .8s cubic-bezier(.45,.05,.35,1.2); z-index:20;
      will-change:transform; }
  #bunnyWrap svg { width:100%; height:100%; display:block; overflow:visible; }

  body.s-splash #bunnyWrap { left:50%; top:46%; width:54vmin; height:75.6vmin; }
  body.s-feed   #bunnyWrap { left:50%; top:47%; width:50vmin; height:70vmin; }
  body.s-sleep  #bunnyWrap { left:50%; top:55%; width:46vmin; height:64.4vmin; }
  body.s-sing   #bunnyWrap { left:50%; top:44%; width:42vmin; height:58.8vmin; }
  body.s-tidy   #bunnyWrap { left:17%; top:60%; width:34vmin; height:47.6vmin; }
  body.s-stack  #bunnyWrap { left:82%; top:62%; width:32vmin; height:44.8vmin; }

  /* bunny idle breathing */
  #bunnyBody { animation:breathe 3.4s ease-in-out infinite; transform-origin:200px 460px; }
  @keyframes breathe { 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.015,.985)} }

  /* eye states */
  .eyesOpen, .eyesHappy, .eyesClosed { transition:opacity .15s; }
  .eyesHappy, .eyesClosed { opacity:0; }
  .bn-happy  .eyesOpen{opacity:0}  .bn-happy .eyesHappy{opacity:1}
  .bn-sleep  .eyesOpen{opacity:0}  .bn-sleep .eyesClosed{opacity:1}
  .bn-blink  .eyesOpen{opacity:0}  .bn-blink .eyesClosed{opacity:1}

  /* mouth states */
  .mSmile,.mOpen,.mYawn,.paci { transition:opacity .12s; }
  .mOpen,.mYawn,.paci { opacity:0; }
  .bn-paci .paci { opacity:1; }
  .bn-paci .mSmile, .bn-paci .mOpen { opacity:0 !important; }
  .bn-eat .mSmile,.bn-sing-m .mSmile{opacity:0} .bn-eat .mOpen,.bn-sing-m .mOpen{opacity:1}
  .bn-yawn .mSmile{opacity:0} .bn-yawn .mYawn{opacity:1}
  .bn-sleep .mSmile{opacity:.55}

  /* ear wiggle */
  .earL,.earR { transform-origin:150px 150px; }
  .earR { transform-origin:250px 150px; }
  .bn-dance .earL { animation:earWigL .55s ease-in-out infinite; }
  .bn-dance .earR { animation:earWigR .55s ease-in-out infinite; }
  @keyframes earWigL { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-8deg)} }
  @keyframes earWigR { 0%,100%{transform:rotate(0)} 50%{transform:rotate(8deg)} }

  /* arms */
  .armL { transform-origin:120px 400px; transition:transform .5s cubic-bezier(.5,-.3,.5,1.3); }
  .armR { transform-origin:280px 400px; transition:transform .5s cubic-bezier(.5,-.3,.5,1.3); }
  .bn-armsup .armL { transform:rotate(150deg); }
  .bn-armsup .armR { transform:rotate(-150deg); }
  .bn-dance .armL { animation:armDanceL 1.1s ease-in-out infinite; }
  .bn-dance .armR { animation:armDanceR 1.1s ease-in-out infinite; }
  @keyframes armDanceL { 0%,100%{transform:rotate(140deg)} 50%{transform:rotate(165deg)} }
  @keyframes armDanceR { 0%,100%{transform:rotate(-165deg)} 50%{transform:rotate(-140deg)} }

  /* bottle raise (feed) */
  .heldBottle { transform-origin:200px 470px; transition:transform .6s cubic-bezier(.5,-.2,.4,1.2); }
  .bn-drink .heldBottle { transform:translate(-6px,-158px) rotate(-38deg) scale(1.06); }
  .bn-drink .armL { transform:rotate(38deg); }
  .bn-drink .armR { transform:rotate(-38deg); }

  /* whole-bunny motion */
  .bn-bounce { animation:bnBounce .55s cubic-bezier(.3,1.6,.5,1) 1; }
  @keyframes bnBounce { 0%{transform:translate(-50%,-52%) scale(1)} 35%{transform:translate(-50%,-56%) scale(1.05,.95)} 70%{transform:translate(-50%,-50%) scale(.97,1.03)} 100%{transform:translate(-50%,-52%) scale(1)} }
  .bn-dance-move { animation:bnDance 1.1s ease-in-out infinite; }
  @keyframes bnDance { 0%,100%{transform:translate(-50%,-52%) rotate(-4deg)} 25%{transform:translate(-50%,-56%) rotate(0deg)} 50%{transform:translate(-50%,-52%) rotate(4deg)} 75%{transform:translate(-50%,-56%) rotate(0deg)} }
  .bn-sleepy-sway #bunnyBody { animation:sleepBreathe 4.5s ease-in-out infinite; }
  @keyframes sleepBreathe { 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.03,.97)} }

  .cheekL,.cheekR { transition:opacity .5s; }

  /* ============ NAV ============ */
  #nav { position:fixed; bottom:max(10px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
      display:flex; gap:3.4vmin; z-index:90; opacity:0; pointer-events:none; transition:opacity .5s; }
  body.playing #nav { opacity:1; pointer-events:auto; }
  .navBtn { width:16vmin; height:16vmin; max-width:96px; max-height:96px; min-width:64px; min-height:64px;
      border-radius:50%; border:none; background:#fff; cursor:pointer;
      box-shadow:0 5px 0 rgba(0,0,0,.10), 0 8px 18px rgba(0,0,0,.12);
      display:flex; align-items:center; justify-content:center; padding:0;
      transition:transform .18s cubic-bezier(.3,1.6,.5,1), box-shadow .18s; }
  .navBtn svg { width:62%; height:62%; }
  .navBtn:active { transform:scale(.88); }
  .navBtn.on { transform:scale(1.14); box-shadow:0 0 0 1vmin rgba(255,255,255,.55), 0 6px 16px rgba(0,0,0,.18); }
  body.s-sleep.dark .navBtn { background:#efe6ff; opacity:.92; }

  /* ============ SPLASH ============ */
  #splash .tapHint { position:absolute; left:50%; top:82%; transform:translateX(-50%);
      width:22vmin; height:22vmin; animation:hintPulse 1.4s ease-in-out infinite; }
  @keyframes hintPulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.18)} }
  #splash .bigTitle { position:absolute; left:50%; top:7%; transform:translateX(-50%);
      font-size:7.5vmin; font-weight:800; color:#e56a8f; letter-spacing:.5vmin;
      text-shadow:0 3px 0 #fff; white-space:nowrap; }
  #nameHint { position:absolute; left:50%; top:94%; transform:translateX(-50%);
      font-size:2.8vmin; color:#c98aad; text-align:center; white-space:nowrap;
      opacity:.7; }
  #shareBtn { position:absolute; left:50%; top:72%; transform:translateX(-50%);
      display:flex; align-items:center; gap:8px; padding:2.5vmin 5vmin;
      background:#0077b5; color:#fff; border:none; border-radius:999px;
      font-size:3.5vmin; font-weight:700; cursor:pointer; z-index:10;
      box-shadow:0 4px 14px rgba(0,119,181,.4); transition:transform .15s; }
  #shareBtn:active { transform:translateX(-50%) scale(.93); }
  #shareBtn svg { width:5vmin; height:5vmin; fill:#fff; }


  /* ============ FEED SCENE ============ */
  #tray { position:absolute; left:50%; bottom:16vmin; transform:translateX(-50%);
      width:min(92vw,86vmin); height:20vmin; background:#fff6ea; border-radius:5vmin;
      box-shadow:0 6px 0 rgba(180,120,60,.18), inset 0 2px 8px rgba(255,255,255,.9);
      display:flex; align-items:center; justify-content:space-evenly; z-index:30; }
  .food { width:15vmin; height:15vmin; cursor:pointer; transition:transform .2s cubic-bezier(.3,1.6,.5,1);
      display:flex; align-items:center; justify-content:center; position:relative; touch-action:none; }
  .food svg { width:100%; height:100%; overflow:visible; pointer-events:none; }
  .food:active { transform:scale(1.15); }
  .food.gone { opacity:0; pointer-events:none; transform:scale(.3); transition:all .3s; }
  .food.flying { position:fixed; z-index:60; transition:all .55s cubic-bezier(.4,0,.5,1); margin:0; }
  #tummyMeter { position:absolute; top:3.5vmin; right:3.5vmin; display:flex; gap:1.2vmin; z-index:40; }
  #tummyMeter .heart { width:6vmin; height:6vmin; opacity:.25; transition:all .4s cubic-bezier(.3,1.8,.5,1); }
  #tummyMeter .heart.full { opacity:1; transform:scale(1.2); }

  /* ============ SLEEP SCENE ============ */
  #bedFrame { position:absolute; left:50%; top:55%; transform:translate(-50%,-50%);
      width:74vmin; height:64vmin; z-index:10; pointer-events:none; }
  #blanket { position:absolute; left:50%; top:76%; transform:translate(-50%,0);
      width:60vmin; height:46vmin; z-index:25; cursor:pointer; touch-action:none;
      transition:top .9s cubic-bezier(.4,0,.3,1); animation:blanketNudge 2.2s ease-in-out infinite; }
  @keyframes blanketNudge { 0%,100%{margin-top:0} 50%{margin-top:-1.6vmin} }
  body.tucked #blanket, body.asleep #blanket { animation:none; }
  body.tucked #blanket { top:54.5%; }
  #lamp { position:absolute; right:5vmin; top:14vmin; width:16vmin; height:24vmin; cursor:pointer; z-index:30; }
  #lampGlow { transition:opacity .8s; }
  body.dark #lampGlow { opacity:0 !important; }
  #musicBox { position:absolute; right:6vmin; top:44vmin; width:15vmin; height:17vmin; cursor:pointer; z-index:30; }
  /* bedtime options tray: every way to make the toy sleep, one big button each */
  #sleepOpts { position:absolute; left:2.5vmin; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:2.2vmin; z-index:36; }
  .sopt { width:13vmin; height:13vmin; max-width:88px; max-height:88px; border-radius:50%;
      border:none; background:#fff; cursor:pointer; padding:2.4vmin;
      box-shadow:0 4px 0 rgba(90,70,160,.15); transition:transform .15s, box-shadow .3s; }
  .sopt:active { transform:scale(.86); }
  .sopt.on { background:#fff3fa;
      box-shadow:0 0 0 .9vmin rgba(255,255,255,.75), 0 4px 12px rgba(90,70,160,.35); }
  .sopt svg { width:100%; height:100%; display:block; }
  body.s-sleep.dark .sopt { background:#efe6ff; }
  body.s-sleep.dark .sopt.on { background:#fff; }
  #musicBox.spinning .mbDancer { animation:mbSpin 2.4s linear infinite; transform-origin:50px 34px; }
  @keyframes mbSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  #sunBtn { position:absolute; left:50%; top:9vmin; transform:translateX(-50%) scale(0);
      width:17vmin; height:17vmin; cursor:pointer; z-index:35; transition:transform .6s cubic-bezier(.3,1.7,.5,1); }
  body.asleep #sunBtn { transform:translateX(-50%) scale(1); animation:sunPulse 1.6s ease-in-out infinite .7s; }
  @keyframes sunPulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.12)} }
  .nightStar { position:absolute; width:5vmin; height:5vmin; cursor:pointer; z-index:15;
      opacity:0; transition:opacity 1s; animation:starTwinkle 2.2s ease-in-out infinite; }
  body.dark .nightStar { opacity:1; }
  @keyframes starTwinkle { 0%,100%{transform:scale(1); filter:brightness(1)} 50%{transform:scale(1.25); filter:brightness(1.5)} }
  #moon { position:absolute; right:16vmin; top:6vmin; width:14vmin; height:14vmin; opacity:0; transition:opacity 1.2s; z-index:5; }
  body.dark #moon { opacity:1; }
  .zzz { position:fixed; font-size:6vmin; font-weight:800; color:#fff; text-shadow:0 2px 6px rgba(80,60,160,.5);
      pointer-events:none; z-index:70; animation:zzzFloat 2.6s ease-out forwards; }
  @keyframes zzzFloat { 0%{opacity:0; transform:translate(0,0) scale(.5) rotate(8deg)} 20%{opacity:1}
      100%{opacity:0; transform:translate(7vmin,-22vmin) scale(1.3) rotate(-10deg)} }

  /* ============ SING SCENE ============ */
  #singStage { position:absolute; left:0; right:0; bottom:0; height:34%;
      background:linear-gradient(180deg,#b0629b,#8e4a80); border-radius:50% 50% 0 0 / 18% 18% 0 0; z-index:5; }
  #singStage::before { content:''; position:absolute; inset:2.2vmin 0 0 0; border-radius:inherit;
      background:linear-gradient(180deg,#d17bb8,#a85694); }
  .spotlight { position:absolute; top:0; width:34vmin; height:62%; opacity:.35; z-index:6;
      background:linear-gradient(180deg,rgba(255,255,200,.9),rgba(255,255,200,0));
      clip-path:polygon(38% 0,62% 0,100% 100%,0 100%); }
  .friend { position:absolute; width:26vmin; height:30vmin; z-index:18; cursor:pointer; touch-action:none;
      transition:transform .3s cubic-bezier(.3,1.6,.5,1); }
  .friend svg { width:100%; height:100%; overflow:visible; pointer-events:none; }
  .friend:active { transform:scale(1.1); }
  #friendCow   { left:2%;  bottom:22%; width:22vmin; height:26vmin; }
  #friendDuck  { right:2%; bottom:22%; width:20vmin; height:24vmin; }
  #friendSheep { left:34%; bottom:16%; width:22vmin; height:25vmin; }
  #friendCat   { right:22%; bottom:22%; width:20vmin; height:24vmin; }
  #friendDog   { left:18%; bottom:18%; width:22vmin; height:25vmin; }
  #friendFrog  { right:38%; bottom:16%; width:18vmin; height:21vmin; }
  #friendOwl   { left:46%; bottom:22%; width:19vmin; height:23vmin; }
  .friend.bopping { animation:friendBop .55s ease-in-out infinite; }
  .friend.swaying { animation:friendSway 1.1s ease-in-out infinite; }
  @keyframes friendBop { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3.5vmin) scale(1.06,.94)} }
  @keyframes friendSway { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
  .friend .fMouth { transition:transform .1s; transform-origin:center; }
  .friend.singing .fMouth { animation:fMouthSing .28s ease-in-out infinite; }
  @keyframes fMouthSing { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(2.2)} }
  #starSongBtn { position:absolute; left:50%; top:6vmin; transform:translateX(-50%);
      width:15vmin; height:15vmin; cursor:pointer; z-index:30; animation:starBtnFloat 2.4s ease-in-out infinite; }
  @keyframes starBtnFloat { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-1.6vmin)} }
  .noteFloat { position:fixed; width:7vmin; height:7vmin; pointer-events:none; z-index:65;
      animation:noteUp 2.2s ease-out forwards; }
  @keyframes noteUp { 0%{opacity:0; transform:translateY(0) rotate(-15deg) scale(.5)} 15%{opacity:1}
      100%{opacity:0; transform:translateY(-30vmin) rotate(15deg) scale(1.2)} }

  /* ============ TIDY SCENE ============ */
  #shelf { position:absolute; right:4vmin; top:50%; transform:translateY(-50%);
      width:44vmin; height:66vmin; z-index:8; pointer-events:none; }
  .slot { position:absolute; width:15vmin; height:15vmin; z-index:9; border-radius:3vmin;
      display:flex; align-items:center; justify-content:center; }
  .slot svg { width:78%; height:78%; opacity:.28; }
  .slot.hint { animation:slotHint 1s ease-in-out infinite; }
  @keyframes slotHint { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0)} 50%{box-shadow:0 0 0 1.6vmin rgba(255,255,255,.65)} }
  .slot.filled svg { opacity:0; }
  .toy { position:absolute; width:15vmin; height:15vmin; z-index:40; cursor:grab; touch-action:none;
      display:flex; align-items:center; justify-content:center;
      transition:left .55s cubic-bezier(.4,0,.4,1.2), top .55s cubic-bezier(.4,0,.4,1.2), transform .2s; }
  .toy svg { width:100%; height:100%; overflow:visible; pointer-events:none;
      filter:drop-shadow(0 4px 4px rgba(40,90,130,.25)); }
  .toy.dragging { transition:none; z-index:60; transform:scale(1.25); cursor:grabbing; }
  .toy.placed { pointer-events:none; transform:scale(.96); filter:none; }
  #messBtn { position:absolute; left:5vmin; top:5vmin; width:17vmin; height:17vmin; border-radius:50%;
      border:none; background:#fff; cursor:pointer; z-index:45; padding:2vmin;
      box-shadow:0 5px 0 rgba(50,110,160,.18); transform:scale(0); transition:transform .5s cubic-bezier(.3,1.7,.5,1); }
  #messBtn.show { transform:scale(1); animation:hintPulse 1.5s ease-in-out infinite .6s; }
  #messBtn svg { width:100%; height:100%; }

  /* ============ STACK (ring stacker) SCENE ============ */
  #pegRod { position:absolute; left:38%; bottom:14vmin; transform:translateX(-50%);
      width:3vmin; height:44vmin; border-radius:1.5vmin; z-index:5; pointer-events:none;
      background:linear-gradient(90deg,#8a5a38,#c98a5b 45%,#a1704a); }
  #pegStand { position:absolute; left:38%; bottom:12vmin; transform:translateX(-50%);
      width:20vmin; z-index:6; pointer-events:none; }
  #pegHint { position:absolute; left:38%; bottom:12vmin; transform:translateX(-50%);
      width:15vmin; height:60vmin; z-index:7; pointer-events:none; opacity:0; transition:opacity .3s; }
  #pegHint.show { opacity:1; animation:slotHint 1s ease-in-out infinite; border-radius:2vmin; }
  .ring { position:absolute; z-index:40; cursor:grab; touch-action:none;
      transition:left .5s cubic-bezier(.4,0,.4,1.2), top .5s cubic-bezier(.4,0,.4,1.2),
      bottom .5s cubic-bezier(.4,0,.4,1.2), transform .2s; }
  .ring svg { width:100%; height:100%; overflow:visible; pointer-events:none;
      filter:drop-shadow(0 4px 4px rgba(40,90,60,.25)); display:block; }
  .ring.dragging { transition:none; z-index:60; transform:scale(1.18) !important; cursor:grabbing; }
  .ring.placed { left:38% !important; transform:translateX(-50%); pointer-events:none; }
  .ring.falling { transition:left .7s cubic-bezier(.4,0,.5,1), top .7s cubic-bezier(.4,0,.5,1), transform .7s; }
  #stackBtn { position:absolute; left:5vmin; top:5vmin; width:17vmin; height:17vmin; border-radius:50%;
      border:none; background:#fff; cursor:pointer; z-index:45; padding:2.2vmin;
      box-shadow:0 5px 0 rgba(50,140,90,.18); transform:scale(0); transition:transform .5s cubic-bezier(.3,1.7,.5,1); }
  #stackBtn.show { transform:scale(1); animation:hintPulse 1.5s ease-in-out infinite .6s; }
  #stackBtn svg { width:100%; height:100%; }

  /* ============ PARTICLES ============ */
  .pt { position:fixed; pointer-events:none; z-index:80; will-change:transform,opacity; }
  .pt-pop { animation:ptPop .9s ease-out forwards; }
  @keyframes ptPop { 0%{opacity:1; transform:translate(0,0) scale(.4) rotate(0)}
      100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(1.25) rotate(var(--rot))} }
  .pt-fall { animation:ptFall 2.4s ease-in forwards; }
  @keyframes ptFall { 0%{opacity:1; transform:translate(0,0) rotate(0)} 80%{opacity:1}
      100%{opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--rot))} }

  /* soft clouds decor */
  .cloud { position:absolute; opacity:.8; pointer-events:none; z-index:2; }
  .cloud svg { width:100%; height:100%; }

</style>
</head>
<body class="s-splash">
<div id="stage">

  <!-- ================= persistent BUNNY ================= -->
  <div id="bunnyWrap">
    <svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gBody" cx="42%" cy="32%" r="80%">
          <stop offset="0%" stop-color="#fbc4bd"/><stop offset="70%" stop-color="#f5aca6"/>
          <stop offset="100%" stop-color="#eb9a95"/>
        </radialGradient>
        <radialGradient id="gCream" cx="45%" cy="35%" r="75%">
          <stop offset="0%" stop-color="#fffdf6"/><stop offset="100%" stop-color="#f7ecd8"/>
        </radialGradient>
      </defs>
      <g id="bunnyBody">
        <!-- ears: close together, near-vertical like the toy -->
        <g class="earL">
          <ellipse cx="160" cy="68" rx="42" ry="84" fill="url(#gBody)" transform="rotate(-6 160 68)"/>
          <ellipse cx="163" cy="76" rx="24" ry="60" fill="url(#gCream)" transform="rotate(-6 163 76)"/>
        </g>
        <g class="earR">
          <ellipse cx="240" cy="68" rx="42" ry="84" fill="url(#gBody)" transform="rotate(6 240 68)"/>
          <ellipse cx="237" cy="76" rx="24" ry="60" fill="url(#gCream)" transform="rotate(6 237 76)"/>
        </g>
        <!-- feet (behind body) -->
        <ellipse cx="126" cy="516" rx="52" ry="33" fill="url(#gBody)"/>
        <ellipse cx="274" cy="516" rx="52" ry="33" fill="url(#gBody)"/>
        <ellipse cx="120" cy="519" rx="31" ry="19" fill="url(#gCream)"/>
        <ellipse cx="280" cy="519" rx="31" ry="19" fill="url(#gCream)"/>

/* ================= AUDIO ENGINE (all synth, offline) ================= */
let AC=null, master=null;
function audio(){ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain(); master.gain.value=.4; master.connect(AC.destination);}
  if(AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,dur,{type='sine',vol=.5,at=0,slide=null,vib=0}={}){
  const ctx=audio(), t=ctx.currentTime+at;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide,20),t+dur);
  if(vib){ const l=ctx.createOscillator(), lg=ctx.createGain(); l.frequency.value=6; lg.gain.value=vib;
    l.connect(lg); lg.connect(o.frequency); l.start(t); l.stop(t+dur+.05); }
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.05);
}

/* melody player */
let songTimer=[], songPlaying=false;
function stopSong(){ songTimer.forEach(clearTimeout); songTimer=[]; songPlaying=false; }
function playSong(seq,{bpm=108,type='triangle',vol=.4,loop=false,onBeat=null,onEnd=null}={}){
  stopSong(); songPlaying=true;
  const beat=60/bpm; let t=0;
  seq.forEach(([n,len])=>{
    const dur=len*beat;
    songTimer.push(setTimeout(()=>{ if(!songPlaying)return;
      if(n) tone(NOTE[n],dur*.92,{type,vol});
      if(onBeat) onBeat(n);
    },t*1000));
    t+=dur;
  });
  songTimer.push(setTimeout(()=>{ if(!songPlaying)return;
    if(loop&&songPlaying){ playSong(seq,{bpm,type,vol,loop,onBeat,onEnd}); }
    else { songPlaying=false; if(onEnd)onEnd(); } },t*1000));
  return t; /* seconds */
}

function burst(x,y,{n=10,shape='heart',cls='pt-pop',spread=18,colors=PALETTE}={}){
  for(let i=0;i<n;i++){
    const d=document.createElement('div'); d.className='pt '+cls;
    const sz=vmin(2.6+Math.random()*2.6);
    d.style.cssText=`left:${x-sz/2}px;top:${y-sz/2}px;width:${sz}px;height:${sz}px;`;
    d.style.setProperty('--dx',(Math.random()*2-1)*vmin(spread)+'px');
    d.style.setProperty('--dy',(cls==='pt-fall'? (vmin(30)+Math.random()*vmin(40)) : (Math.random()*2-1)*vmin(spread))+'px');
    d.style.setProperty('--rot',(Math.random()*2-1)*360+'deg');
    d.innerHTML=PT_SHAPES[shape].replaceAll('COL',colors[i%colors.length]);
    document.body.appendChild(d); setTimeout(()=>d.remove(),2600);
  }
}

  burst(Math.random()*innerWidth, -vmin(4), {n:14,shape:'star',cls:'pt-fall'}),i*260); }
function bunnyCenter(){ const r=bunny.getBoundingClientRect();

/* ================= FEED ================= */
let fed=0;
const inits={};
inits.feed=()=>{ fed=0; updateTummy(); resetTray(); };
cleanups.feed=()=>{};
function updateTummy(){ $$('#tummyMeter .heart').forEach((h,i)=>h.classList.toggle('full',i<fed)); }
function resetTray(){ $$('.food').forEach(f=>{ f.classList.remove('gone'); }); }
function cheeksGlow(){ const op=Math.min(.35+fed*.14,.9);
  $$('.cheekL,.cheekR').forEach(c=>c.style.opacity=op); }

$$('.food').forEach(f=>{
  f.addEventListener('pointerdown',e=>{
    if(f.classList.contains('gone'))return;
    e.preventDefault();
    if(body.classList.contains('feeding')){ S.tap();
      f.style.transform='scale(1.15) rotate(-8deg)';
      setTimeout(()=>f.style.transform='',180); return; }
    S.tap(); feedWith(f);
  });
});
function feedWith(food){
  body.classList.add('feeding');
  const r=food.getBoundingClientRect(), m=bunnyCenter();
  const fly=food.cloneNode(true); fly.classList.add('flying');
  fly.style.cssText=`left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;transition:all .45s cubic-bezier(.4,0,.5,1);`;
  document.body.appendChild(fly); food.classList.add('gone');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fly.style.left=(m.mouthX-r.width/2)+'px'; fly.style.top=(m.mouthY-r.height/2)+'px';
    fly.style.transform='scale(.6) rotate(20deg)';
  }));
  setTimeout(()=>{ bunnyClass('bn-eat',800);
    let bites=0; const chewTimer=setInterval(()=>{
      S.chomp(); fly.style.transform=`scale(${.5-bites*.12}) rotate(${20-bites*15}deg)`;
      if(++bites>=3){ clearInterval(chewTimer); fly.remove();
        S.gulp(); fed++; updateTummy(); cheeksGlow();
        burst(m.mouthX,m.mouthY,{n:6,shape:'heart',spread:12});
        bunnyClass('bn-happy',800); bounce();
        body.classList.remove('feeding');
        if(fed>=4) setTimeout(allDone,700);
      }
    },280);
  },480);
}
function allDone(){
  S.burp(); setTimeout(()=>{ S.yay(); say('Yummy! All done!'); },500);
  bunnyClass('bn-happy',3000); bunny.classList.add('bn-dance-move'); bunnyClass('bn-dance',3000);
  confettiRain();
  const m=bunnyCenter(); burst(m.x,m.y-vmin(10),{n:14,shape:'heart',spread:26});
  setTimeout(()=>{ bunny.classList.remove('bn-dance-move');
    fed=0; updateTummy(); resetTray();
    $$('.cheekL,.cheekR').forEach(c=>c.style.opacity=.35); },3200);
}

bunny.addEventListener('pointerdown',e=>{

/* ================= SLEEP ================= */
let sleepState, snoreTimer=null, zzzTimer=null;
inits.sleep=()=>{
  sleepState={tucked:false,dark:false,lullaby:false,paci:false,kiss:false,asleep:false};
  body.classList.remove('tucked','dark','asleep');
  bunny.classList.add('bn-sleepy-sway'); bunny.classList.remove('bn-paci');
  $$('#sleepOpts .sopt').forEach(b=>b.classList.remove('on'));
  $('#musicBox').classList.remove('spinning');
  scatterStars();
};
cleanups.sleep=()=>{ clearInterval(snoreTimer); clearInterval(zzzTimer);
  body.classList.remove('tucked','dark','asleep'); bunny.classList.remove('bn-paci');
  $$('.nightStar').forEach(s=>s.remove());
  $('#musicBox').classList.remove('spinning'); };
const comfortCount=()=>['tucked','dark','lullaby','paci','kiss'].filter(k=>sleepState[k]).length;
function soptSync(){
  [['blanket','tucked'],['lamp','dark'],['lullaby','lullaby'],['paci','paci'],['kiss','kiss']]
    .forEach(([id,key])=>$('#sopt-'+id).classList.toggle('on',!!sleepState[key]));
}

function scatterStars(){
  $$('.nightStar').forEach(s=>s.remove());
  const spots=[[8,10],[22,20],[38,8],[60,16],[76,8],[88,22],[14,34],[85,38]];
  spots.forEach(([x,y],i)=>{
    const d=document.createElement('div'); d.className='nightStar';
    d.style.cssText=`left:${x}%;top:${y}%;animation-delay:${i*.3}s`;
    d.innerHTML=PT_SHAPES.star.replaceAll('COL','#fff3b0');
    d.addEventListener('pointerdown',ev=>{ S.twinkleTap();
      burst(ev.clientX,ev.clientY,{n:4,shape:'star',spread:8,colors:['#fff3b0','#ffe57f']}); });
    $('#sleep').appendChild(d);
  });
}
function doBlanket(){
  if(sleepState.asleep) return;
  sleepState.tucked=!sleepState.tucked;
  body.classList.toggle('tucked',sleepState.tucked);
  soptSync(); S.tap(); if(sleepState.tucked){ S.chime(); checkAsleep(); }
}
function doLamp(){
  if(sleepState.asleep) return;
  sleepState.dark=!sleepState.dark;
  body.classList.toggle('dark',sleepState.dark);
  soptSync(); S.click(); if(sleepState.dark) checkAsleep();
}
function doLullaby(){
  if(sleepState.asleep) return;
  sleepState.lullaby=!sleepState.lullaby;
  const mb=$('#musicBox');
  if(sleepState.lullaby){ mb.classList.add('spinning');
    playSong(TUNE_LULLABY,{bpm:76,type:'sine',vol:.22,loop:true}); }
  else { mb.classList.remove('spinning'); stopSong(); }
  soptSync(); S.click(); if(sleepState.lullaby) checkAsleep();
}
function doPaci(){
  if(sleepState.asleep) return;
  sleepState.paci=!sleepState.paci;
  bunny.classList.toggle('bn-paci',sleepState.paci);
  soptSync();
  tone(500,.08,{type:'sine',vol:.3}); tone(380,.1,{type:'sine',vol:.3,at:.12});
  if(sleepState.paci) checkAsleep();
}
function doKiss(){
  if(sleepState.asleep) return;
  sleepState.kiss=true; soptSync();
  tone(900,.14,{type:'sine',vol:.35,slide:400}); S.chime();
  const b=$('#sopt-kiss').getBoundingClientRect(), m=bunnyCenter();
  burst(b.left+b.width/2,b.top+b.height/2,{n:3,shape:'heart',spread:8,colors:['#f2557a']});
  setTimeout(()=>{ burst(m.x,m.y-vmin(6),{n:6,shape:'heart',spread:12,colors:['#f2557a','#f78fb0']});
    bunnyClass('bn-happy',700);
    $$('.cheekL,.cheekR').forEach(c=>{ c.style.opacity=.8; setTimeout(()=>c.style.opacity=.35,1200); });
  },350);
  checkAsleep();
}
$('#sopt-blanket').addEventListener('pointerdown',doBlanket);
$('#sopt-lamp').addEventListener('pointerdown',doLamp);
$('#sopt-lullaby').addEventListener('pointerdown',doLullaby);
$('#sopt-paci').addEventListener('pointerdown',doPaci);
$('#sopt-kiss').addEventListener('pointerdown',doKiss);
$('#blanket').addEventListener('pointerdown',doBlanket);
$('#lamp').addEventListener('pointerdown',doLamp);
$('#musicBox').addEventListener('pointerdown',doLullaby);
const sleepReady=()=>(sleepState.tucked&&sleepState.dark)||comfortCount()>=3;
function checkAsleep(){
  if(!sleepReady()||sleepState.asleep) return;
  setTimeout(()=>{
    if(!sleepReady()||sleepState.asleep||scene!=='sleep') return;
    S.yawn(); bunnyClass('bn-yawn',1100);
    setTimeout(()=>{
      if(scene!=='sleep') return;
      sleepState.asleep=true; body.classList.add('asleep');
      bunny.classList.add('bn-sleep');
      say('Night night, bunny');
      snoreTimer=setInterval(()=>{ S.snoreIn(); setTimeout(()=>S.snoreOut(),900); },2600);
      zzzTimer=setInterval(()=>{
        const m=bunnyCenter(); const z=document.createElement('div');
        z.className='zzz'; z.textContent='z';
        z.style.left=(m.x+vmin(12))+'px'; z.style.top=(m.y-vmin(14))+'px';
        document.body.appendChild(z); setTimeout(()=>z.remove(),2700);
      },1400);
    },1200);
  },900);
}
$('#sunBtn').addEventListener('pointerdown',()=>{
  if(!sleepState.asleep) return;
  clearInterval(snoreTimer); clearInterval(zzzTimer); stopSong();
  $('#musicBox').classList.remove('spinning');

  body.classList.remove('dark','asleep','tucked');

});

const ANIMAL_SOUND={cow:'moo',duck:'quack',sheep:'baa',cat:'meow',dog:'woof',frog:'ribbit',owl:'hoot'};
function floatNote(x,y){ const d=document.createElement('div'); d.className='noteFloat';
  d.innerHTML=PT_SHAPES.note.replaceAll('COL',PALETTE[Math.floor(Math.random()*PALETTE.length)]);
  d.style.left=x+'px'; d.style.top=y+'px';
  document.body.appendChild(d); setTimeout(()=>d.remove(),2300); }

function singVerse(animal){
  if(versePlaying) return; versePlaying=true;
  const el=$('#friend'+animal[0].toUpperCase()+animal.slice(1));
  const snd=ANIMAL_SOUND[animal];
  S[snd]();
  $$('.friend').forEach(f=>{ f.classList.remove('swaying'); f.classList.add('bopping'); });
  el.classList.add('singing');
  bunny.classList.add('bn-dance-move'); bunnyClass('bn-dance',20000); bunnyClass('bn-armsup',0);
  bunny.classList.add('bn-armsup');
  const r=el.getBoundingClientRect();
  playSong(ANIMAL_TUNE[animal],{...ANIMAL_STYLE[animal],vol:.36,
    onBeat:n=>{ if(n&&Math.random()<.5) floatNote(r.left+r.width*Math.random(), r.top); },
    onEnd:()=>{
      S[snd](); setTimeout(()=>S[snd](),650);
      setTimeout(()=>{ S.yay(); confettiRain(); endVerse(el); },1400);
    }});
}
function endVerse(el){
  versePlaying=false;
  $$('.friend').forEach(f=>{ f.classList.remove('bopping','singing'); f.classList.add('swaying'); });
  bunny.classList.remove('bn-dance-move','bn-armsup');
}

  const col=i%2, row=Math.floor(i/2);
  const x=shelf.left + shelf.width*(.16+col*.42);
  const y=shelf.top + shelf.height*(.075+row*.303);
  return {x,y};
}
function buildTidy(){
  $$('.toy,.slot').forEach(e=>e.remove()); tidyDone=0;
  $('#messBtn').classList.remove('show');
  const sc=$('#tidy');
  TIDY_ITEMS.forEach((it,i)=>{
    const slot=document.createElement('div'); slot.className='slot hint'; slot.dataset.id=it.id;
    const p=shelfSlotPos(i);
    slot.style.left=p.x+'px'; slot.style.top=p.y+'px';
    slot.innerHTML=it.svg; sc.appendChild(slot);
    const toy=document.createElement('div'); toy.className='toy'; toy.dataset.id=it.id;
    scatterToy(toy,i); toy.innerHTML=it.svg; sc.appendChild(toy);
    toy.addEventListener('pointerdown',ev=>startDrag(ev,toy));
  });
}
function scatterToy(toy,i){
  const spots=[[6,14],[26,26],[8,44],[30,58],[12,72],[34,80]];
  const [xp,yp]=spots[i%spots.length];
  toy.style.left=`calc(${xp}% + ${Math.random()*4}vmin)`;
  toy.style.top=`calc(${yp}% + ${Math.random()*3}vmin)`;
}
function startDrag(ev,toy){
  if(toy.classList.contains('placed')) return;
  ev.preventDefault();
  dragItem=toy; dragMoved=false;
  const r=toy.getBoundingClientRect();
  dragOff={x:ev.clientX-r.left, y:ev.clientY-r.top};
  toy.classList.add('dragging'); toy.setPointerCapture(ev.pointerId);
  S.tap();
}
document.addEventListener('pointermove',ev=>{
  if(!dragItem) return;
  const dx=Math.abs(ev.movementX)+Math.abs(ev.movementY);
  if(dx>1) dragMoved=true;
  dragItem.style.left=(ev.clientX-dragOff.x)+'px';
  dragItem.style.top=(ev.clientY-dragOff.y)+'px';
});
document.addEventListener('pointerup',ev=>{
  if(!dragItem) return;
  const toy=dragItem; dragItem=null; toy.classList.remove('dragging');
  const slot=$(`.slot[data-id="${toy.dataset.id}"]`);
  const sr=slot.getBoundingClientRect(), tr=toy.getBoundingClientRect();
  const dist=Math.hypot(sr.left+sr.width/2-(tr.left+tr.width/2), sr.top+sr.height/2-(tr.top+tr.height/2));
  if(!dragMoved || dist<vmin(16)){ /* tap = auto-place; near = snap */
    placeToy(toy,slot);
  } else { S.tap(); }
});
function placeToy(toy,slot){
  toy.style.left=slot.style.left; toy.style.top=slot.style.top;
  toy.classList.add('placed'); slot.classList.add('filled'); slot.classList.remove('hint');
  setTimeout(()=>{ S.pop(); S.chime();
    const r=slot.getBoundingClientRect();
    burst(r.left+r.width/2,r.top+r.height/2,{n:6,shape:'star',spread:10});
    bunnyClass('bn-happy',700); bounce();
    if(++tidyDone>=TIDY_ITEMS.length) setTimeout(tidyCelebrate,500);
  },560);
}
function tidyCelebrate(){
  S.yay(); say('All clean! Great job, '+CONFIG.childName+'!');
  confettiRain(); bunny.classList.add('bn-dance-move'); bunnyClass('bn-dance',3200); bunnyClass('bn-happy',3200);
  bunnyClass('bn-armsup',3200);
  setTimeout(()=>{ bunny.classList.remove('bn-dance-move');
    $('#messBtn').classList.add('show'); },3300);
}
$('#messBtn').addEventListener('pointerdown',()=>{
  S.boing(); $('#messBtn').classList.remove('show');
  $$('.toy').forEach((toy,i)=>{ toy.classList.remove('placed'); scatterToy(toy,i); });
  $$('.slot').forEach(s=>{ s.classList.remove('filled'); s.classList.add('hint'); });
  tidyDone=0; bunnyClass('bn-happy',700);
});

/* keep slots pinned on resize/rotate */
addEventListener('resize',()=>{ if(scene==='tidy'){
  $$('.slot').forEach((s,i)=>{ const p=shelfSlotPos(i); s.style.left=p.x+'px'; s.style.top=p.y+'px';
    const toy=$(`.toy[data-id="${s.dataset.id}"]`);
    if(toy&&toy.classList.contains('placed')){ toy.style.left=p.x+'px'; toy.style.top=p.y+'px'; } });
}});

/* ================= STACK (ring stacker) ================= */
function ringSVG(color,shade){
  return `<svg viewBox="0 0 100 40">
    <path fill-rule="evenodd" fill="${color}" d="M2,20 A48,18 0 1,0 98,20 A48,18 0 1,0 2,20 Z M27,20 A23,7.5 0 1,0 73,20 A23,7.5 0 1,0 27,20 Z"/>
    <path d="M14 12 A46 16 0 0 1 60 4" stroke="${shade}" stroke-width="4" fill="none" stroke-linecap="round" opacity=".55"/>
  </svg>`;
}
const STACK_RINGS=[
  {id:'g1', w:32, color:'#ef5350', shade:'#ffaba0'},
  {id:'g2', w:27, color:'#ffb74d', shade:'#ffe0b2'},
  {id:'g3', w:23, color:'#ffd54f', shade:'#fff3c4'},
  {id:'g4', w:19, color:'#66bb6a', shade:'#c8e6c9'},
  {id:'g5', w:16, color:'#42a5f5', shade:'#bbdefb'},
];
const STACK_STEP=4.4, STACK_BASE=13;
const STACK_NOTES=['C4','D4','E4','G4','A4'];
let stackOrder=[], sDragItem=null, sDragOff={x:0,y:0}, sDragMoved=false;
inits.stack=()=>{ buildStack(); };
cleanups.stack=()=>{ $$('.ring').forEach(e=>e.remove()); $('#stackBtn').classList.remove('show'); $('#pegHint').classList.remove('show'); };
function updatePegHint(){
  $('#pegHint').classList.toggle('show', scene==='stack' && stackOrder.length<STACK_RINGS.length);
}

function ringScatterSpot(i){
  const spots=[[62,10],[70,26],[58,44],[66,60],[54,76]];
  const [xp,yp]=spots[i%spots.length];
  return {left:`calc(${xp}% + ${Math.random()*4}vmin)`, top:`calc(${yp}% + ${Math.random()*3}vmin)`};
}
function buildStack(){
  $$('.ring').forEach(e=>e.remove()); stackOrder=[];
  $('#stackBtn').classList.remove('show'); $('#pegHint').classList.remove('show');
  const sc=$('#stack');
  STACK_RINGS.forEach((rg,i)=>{
    const ring=document.createElement('div'); ring.className='ring'; ring.dataset.id=rg.id;
    ring.style.width=rg.w+'vmin'; ring.style.height=(rg.w*.4)+'vmin';
    const sp=ringScatterSpot(i); ring.style.left=sp.left; ring.style.top=sp.top;
    ring.innerHTML=ringSVG(rg.color,rg.shade); sc.appendChild(ring);
    ring.addEventListener('pointerdown',ev=>startSDrag(ev,ring));
  });
  updatePegHint();
}
function startSDrag(ev,ring){
  if(ring.classList.contains('placed')) return;
  ev.preventDefault();
  sDragItem=ring; sDragMoved=false;
  const r=ring.getBoundingClientRect();
  sDragOff={x:ev.clientX-r.left, y:ev.clientY-r.top};
  ring.classList.add('dragging'); ring.setPointerCapture(ev.pointerId);
  S.tap();
}
document.addEventListener('pointermove',ev=>{
  if(!sDragItem) return;
  const dx=Math.abs(ev.movementX)+Math.abs(ev.movementY);
  if(dx>1) sDragMoved=true;
  sDragItem.style.left=(ev.clientX-sDragOff.x)+'px';
  sDragItem.style.top=(ev.clientY-sDragOff.y)+'px';
});
document.addEventListener('pointerup',ev=>{
  if(!sDragItem) return;
  const ring=sDragItem; sDragItem=null; ring.classList.remove('dragging');
  placeRing(ring); /* max-easy: pick up a ring, it lands on the peg — she always succeeds */
});
function reflowStack(){
  const rank=id=>STACK_RINGS.findIndex(r=>r.id===id);
  [...stackOrder].sort((a,b)=>rank(a)-rank(b)).forEach((id,pos)=>{
    const el=$(`.ring[data-id="${id}"]`);
    el.style.bottom=(STACK_BASE+pos*STACK_STEP)+'vmin'; el.style.zIndex=10+pos;
  });
}
function placeRing(ring){
  if(ring.classList.contains('placed')) return;
  stackOrder.push(ring.dataset.id);
  ring.classList.add('placed');
  ring.style.top='';
  reflowStack(); updatePegHint();
  setTimeout(()=>{ S.pop();
    tone(NOTE[STACK_NOTES[Math.min(stackOrder.length-1,4)]],.45,{type:'triangle',vol:.4});
    const r=ring.getBoundingClientRect();
    burst(r.left+r.width/2,r.top+r.height/2,{n:5,shape:'star',spread:9});
    bunnyClass('bn-happy',700); bounce();
    if(stackOrder.length>=STACK_RINGS.length) setTimeout(stackCelebrate,500);
  },520);
}
function stackCelebrate(){
  S.yay(); say('All stacked! Great job, '+CONFIG.childName+'!');
  confettiRain();
  bunny.classList.add('bn-dance-move'); bunnyClass('bn-dance',3200); bunnyClass('bn-happy',3200); bunnyClass('bn-armsup',3200);
  setTimeout(()=>{ bunny.classList.remove('bn-dance-move'); $('#stackBtn').classList.add('show'); },3300);
}
$('#stackBtn').addEventListener('pointerdown',()=>{
  S.boing(); $('#stackBtn').classList.remove('show');
  $$('.ring').forEach((ring,i)=>{
    ring.classList.remove('placed'); ring.classList.add('falling');
    ring.style.bottom=''; ring.style.zIndex='';
    const sp=ringScatterSpot(i); ring.style.left=sp.left; ring.style.top=sp.top;
    ring.style.transform=`rotate(${(Math.random()*2-1)*40}deg)`;
    setTimeout(()=>{ ring.classList.remove('falling'); ring.style.transform=''; },720);
  });
  stackOrder=[]; updatePegHint(); bunnyClass('bn-happy',700); S.giggle();
});

/* keep placed rings pinned on resize/rotate (bottom/left:38% already relative, no-op needed) */

/* block context menu / double-tap zoom */
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
let lastTouch=0;
document.addEventListener('touchend',e=>{ const now=Date.now();
  if(now-lastTouch<350) e.preventDefault(); lastTouch=now; },{passive:false});
</script>
</body>
